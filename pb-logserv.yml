- name: Configure and start Log Server.
  hosts: localhost.my.domain
    
  tasks:
      
    - name: Include variables from ai_vars directory.
      when: item is match('.*\.(yml|yaml)$')
      ansible.builtin.include_vars:
        file: "{{ item }}"
      loop: "{{ query('ansible.builtin.fileglob', ai_vars ~ '/*') }}"

    - name: Display vars.
      ansible.builtin.debug:
        msg: |
          ai_pull_mode: {{ ai_pull_mode | d(false) }}
          ai_vars: {{ ai_vars }}

    - name: Install packages.
      when: ai_pull_mode | d(false)
      community.general.pkgng:
        name:
          - lnav
          - syslog-ng

    - name: Stop and disable syslogd
      ansible.builtin.import_role:
        name: vbotka.freebsd.postinstall
        tasks_from: syslogd.yml

    - name: Configure and start syslog-ng
      ansible.builtin.import_role:
        name: vbotka.freebsd.postinstall
        tasks_from: syslog-ng.yml
